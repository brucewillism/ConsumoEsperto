<ng-container *ngIf="!dashboardCarregando">
  <button
    class="ai-chat-toggle"
    type="button"
    (click)="toggle()"
    aria-label="Abrir assistente J.A.R.V.I.S."
  >
    <i class="fas fa-robot" aria-hidden="true"></i>
  </button>

  <div
    class="ai-chat-backdrop"
    *ngIf="aberto"
    (click)="fechar()"
    aria-hidden="true"
  ></div>

  <section
    class="ai-chat-panel"
    [class.ai-chat-panel--fullscreen]="isFullscreen"
    *ngIf="aberto"
    role="dialog"
    aria-modal="true"
    aria-label="J.A.R.V.I.S."
  >
    <header class="ai-chat-panel-header">
      <strong>J.A.R.V.I.S.</strong>
      <button type="button" class="btn-fechar-chat jarvis-chat-fechar" (click)="fecharChat()" aria-label="Fechar chat">
        <span aria-hidden="true">✕</span>
      </button>
    </header>

    <div class="chat-sugestoes" *ngIf="!carregando">
      <div class="chat-sugestoes-track" role="list">
        <button
          type="button"
          class="chip-sugestao chip-sugestao--tutorial"
          role="listitem"
          (click)="enviarComandoTutorial()"
          [disabled]="carregando"
          [class.ativo]="tutorialAtivo"
        >
          📖 Guia de Uso
        </button>
        <button
          type="button"
          class="chip-sugestao"
          role="listitem"
          *ngFor="let s of sugestoes"
          (click)="usarSugestao(s)"
          [disabled]="carregando"
        >
          {{ s.rotulo }}
        </button>
      </div>
    </div>

    <div class="tutorial-banner" *ngIf="tutorialAtivo">
      <span>📖 Modo tutorial ativo</span>
      <button type="button" class="tutorial-fechar" (click)="encerrarTutorial()">
        ✕ Encerrar
      </button>
    </div>

    <div class="chat-body jarvis-chat-body" #chatBody>
      <div class="chat-msg" *ngFor="let msg of historico" [class.user]="msg.autor === 'user'">
        {{ msg.texto }}
      </div>
      <div class="chat-msg jarvis-typing" *ngIf="carregando">
        <span class="typing-dot" aria-hidden="true"></span>
        <span class="typing-dot" aria-hidden="true"></span>
        <span class="typing-dot" aria-hidden="true"></span>
        <span class="typing-label">{{ mensagemDigitando }}</span>
      </div>
    </div>

    <form class="chat-form jarvis-chat-input" (ngSubmit)="enviar()">
      <textarea
        name="chatMensagem"
        [(ngModel)]="mensagem"
        (keydown)="onKeydown($event)"
        rows="2"
        placeholder="Como vou fechar o mês?"
        aria-label="Mensagem para o J.A.R.V.I.S."
      ></textarea>
      <button type="submit" [disabled]="carregando || !mensagem.trim()" aria-label="Enviar">
        <i class="fas fa-paper-plane" aria-hidden="true"></i>
      </button>
    </form>
  </section>
</ng-container>
