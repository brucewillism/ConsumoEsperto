<h2 mat-dialog-title>Convidar parceiro(a)</h2>
<mat-dialog-content class="ce-form-body">
  <div class="ce-form-alert" *ngIf="conviteErro">{{ conviteErro }}</div>
  <mat-form-field appearance="outline" class="full">
    <mat-label>E-mail</mat-label>
    <input matInput type="email" ceMask="email" [(ngModel)]="conviteEmail" placeholder="parceiro@email.com" [disabled]="salvando" />
  </mat-form-field>
  <mat-form-field appearance="outline" class="full">
    <mat-label>WhatsApp</mat-label>
    <input matInput ceMask="phone" [(ngModel)]="conviteWhatsapp" placeholder="+55 (11) 99999-9999" [disabled]="salvando" />
  </mat-form-field>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close [disabled]="salvando">Cancelar</button>
  <button mat-raised-button color="primary" (click)="enviar()" [disabled]="salvando">Enviar convite</button>
</mat-dialog-actions>
