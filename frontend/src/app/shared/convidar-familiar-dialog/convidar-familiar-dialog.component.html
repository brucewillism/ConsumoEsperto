<h2 mat-dialog-title>Convidar parceiro(a)</h2>
<mat-dialog-content class="ce-form-body">
  <p class="hint">
    Informe o e-mail ou o WhatsApp de quem vai compartilhar o orçamento. Pelo menos um dos dois é obrigatório.
  </p>
  <div class="ce-form-alert" *ngIf="conviteErro">{{ conviteErro }}</div>

  <mat-form-field appearance="outline" subscriptSizing="dynamic" floatLabel="always" class="full">
    <mat-label>E-mail do convidado</mat-label>
    <input
      matInput
      type="email"
      ceMask="email"
      [(ngModel)]="conviteEmail"
      autocomplete="email"
      [disabled]="salvando"
    />
    <mat-hint>Quem já usa o app com este e-mail recebe o convite automaticamente.</mat-hint>
  </mat-form-field>

  <p class="ou-divisor" aria-hidden="true">ou</p>

  <mat-form-field appearance="outline" subscriptSizing="dynamic" floatLabel="always" class="full">
    <mat-label>WhatsApp do convidado</mat-label>
    <input
      matInput
      type="tel"
      ceMask="phone"
      [(ngModel)]="conviteWhatsapp"
      autocomplete="tel"
      inputmode="tel"
      [disabled]="salvando"
    />
    <mat-hint>Com DDD. Ex.: (11) 99999-9999</mat-hint>
  </mat-form-field>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close [disabled]="salvando">Cancelar</button>
  <button mat-raised-button color="primary" (click)="enviar()" [disabled]="salvando">
    <mat-icon>send</mat-icon>
    Enviar convite
  </button>
</mat-dialog-actions>
