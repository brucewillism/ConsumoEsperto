<h2 mat-dialog-title>Convidar parceiro(a)</h2>

<form [formGroup]="form" (ngSubmit)="enviar()">
  <mat-dialog-content class="ce-form-body">
    <p class="hint">
      Informe o e-mail ou o WhatsApp de quem vai compartilhar o orçamento. Pelo menos um dos dois é obrigatório.
    </p>
    <div class="ce-form-alert" *ngIf="conviteErro">{{ conviteErro }}</div>

    <mat-form-field appearance="outline" class="full">
      <mat-label>E-mail do convidado</mat-label>
      <input
        matInput
        type="text"
        formControlName="email"
        (input)="onEmailInput($any($event.target).value)"
        autocomplete="email"
        [disabled]="salvando"
      />
      <mat-error *ngIf="form.controls.email.hasError('email')">Digite um e-mail válido.</mat-error>
    </mat-form-field>

    <p class="ou">ou</p>

    <mat-form-field appearance="outline" class="full">
      <mat-label>WhatsApp do convidado</mat-label>
      <input
        matInput
        type="tel"
        inputmode="tel"
        formControlName="whatsapp"
        (input)="onWhatsappInput($any($event.target).value)"
        autocomplete="tel"
        placeholder="(11) 99999-9999"
        [disabled]="salvando"
      />
      <mat-error *ngIf="form.controls.whatsapp.hasError('telefone')">
        Informe o WhatsApp com DDD (mínimo 10 dígitos).
      </mat-error>
    </mat-form-field>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button type="button" mat-button mat-dialog-close [disabled]="salvando">Cancelar</button>
    <button type="submit" mat-raised-button color="primary" [disabled]="salvando">
      <mat-icon>send</mat-icon>
      Enviar convite
    </button>
  </mat-dialog-actions>
</form>
