<h2 mat-dialog-title>Convidar parceiro(a)</h2>

<mat-dialog-content class="convidar-content">
  <p class="hint">
    Informe o e-mail ou o WhatsApp de quem vai compartilhar o orçamento. Pelo menos um dos dois é obrigatório.
  </p>
  <div class="ce-form-alert" *ngIf="conviteErro">{{ conviteErro }}</div>

  <label class="field-label" for="convite-email">E-mail do convidado</label>
  <input
    id="convite-email"
    class="convidar-input"
    type="text"
    [ngModel]="conviteEmail"
    (ngModelChange)="onEmailInput($event)"
    autocomplete="email"
    [disabled]="salvando"
  />

  <p class="ou">ou</p>

  <label class="field-label" for="convite-whatsapp">WhatsApp do convidado</label>
  <input
    id="convite-whatsapp"
    class="convidar-input"
    type="tel"
    inputmode="tel"
    [ngModel]="conviteWhatsapp"
    (ngModelChange)="onWhatsappInput($event)"
    autocomplete="tel"
    placeholder="(11) 99999-9999"
    [disabled]="salvando"
  />

  <div class="convidar-footer">
    <button type="button" class="convidar-btn-enviar" (click)="enviar()" [disabled]="salvando">
      Enviar convite
    </button>
    <button type="button" class="convidar-btn-cancelar" (click)="fechar()" [disabled]="salvando">
      Cancelar
    </button>
  </div>
</mat-dialog-content>
