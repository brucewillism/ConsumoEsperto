<h2 mat-dialog-title>Convidar parceiro(a)</h2>
<mat-dialog-content class="ce-form-body">
  <p class="hint">
    Informe o e-mail ou o WhatsApp de quem vai compartilhar o orçamento. Pelo menos um dos dois é obrigatório.
  </p>
  <div class="ce-form-alert" *ngIf="conviteErro">{{ conviteErro }}</div>

  <mat-form-field appearance="outline" class="full">
    <mat-label>E-mail do convidado</mat-label>
    <input
      matInput
      type="email"
      [ngModel]="conviteEmail"
      (ngModelChange)="onEmailInput($event)"
      autocomplete="email"
      [disabled]="salvando"
    />
  </mat-form-field>

  <p class="ou">ou</p>

  <mat-form-field appearance="outline" class="full">
    <mat-label>WhatsApp do convidado</mat-label>
    <input
      matInput
      type="tel"
      inputmode="tel"
      [ngModel]="conviteWhatsapp"
      (ngModelChange)="onWhatsappInput($event)"
      autocomplete="tel"
      placeholder="(11) 99999-9999"
      [disabled]="salvando"
    />
  </mat-form-field>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close [disabled]="salvando">Cancelar</button>
  <button mat-raised-button color="primary" (click)="enviar()" [disabled]="salvando">
    <mat-icon>save</mat-icon>
    Enviar convite
  </button>
</mat-dialog-actions>
