<div
  class="loading-indicator"
  [class.loading-indicator--inline]="mode === 'inline'"
  [class.loading-indicator--panel]="mode === 'panel'"
  [class.loading-indicator--overlay]="mode === 'overlay'"
  [class.loading-indicator--sm]="size === 'sm'"
  [class.loading-indicator--md]="size === 'md'"
  [class.loading-indicator--lg]="size === 'lg' || mode === 'overlay'"
  [attr.aria-busy]="true"
  [attr.aria-live]="mode === 'overlay' ? 'polite' : null">
  <div class="loading-indicator__backdrop" *ngIf="mode === 'overlay'" aria-hidden="true"></div>

  <div class="loading-indicator__content">
    <div class="loading-indicator__visual">
      <img
        *ngIf="!assetFailed && mode !== 'overlay'"
        class="loading-indicator__art"
        [class.loading-indicator__art--gif]="isGifAsset"
        [src]="currentAssetUrl"
        alt=""
        (error)="onAssetError()" />
      <div class="loading-indicator__spinner" *ngIf="assetFailed || mode === 'overlay'" aria-hidden="true">
        <span class="loading-indicator__ring"></span>
        <span class="loading-indicator__core"></span>
      </div>
    </div>
    <p class="loading-indicator__message" *ngIf="message">{{ message }}</p>
  </div>
</div>
