<div class="perfil-container">
  <div class="card">
    <h1>Perfil</h1>
    <p class="subtitle">Conta e personalização do assistente J.A.R.V.I.S.</p>

    <div class="toolbar-top">
      <a routerLink="/dashboard" class="link-back"><i class="fas fa-arrow-left"></i> Voltar ao painel</a>
    </div>

    <div class="alert-jarvis" *ngIf="!carregando">
      <div class="alert-icon"><i class="fas fa-robot"></i></div>
      <div class="alert-body">
        <strong>{{ textoCard() }}</strong>
        <p
          class="hint"
          *ngIf="usuario?.preferenciaTratamentoJarvis && usuario?.preferenciaTratamentoJarvis !== 'AUTOMATICO'"
        >
          Preferência manual ativa: o login Google não volta a alterar o tratamento automaticamente.
        </p>
      </div>
      <button type="button" class="btn outline" (click)="abrirModal()">Editar</button>
    </div>

    <div class="status-box" *ngIf="carregando">
      <i class="fas fa-spinner fa-spin"></i>
      <span>Carregando…</span>
    </div>
  </div>
</div>

<div class="modal-layer" *ngIf="modalAberto">
  <div class="modal-backdrop" (click)="fecharModal()"></div>
  <div class="modal-panel" (click)="$event.stopPropagation()" role="dialog" aria-modal="true">
    <h2>Tratamento do J.A.R.V.I.S.</h2>
    <p class="hint">Como o assistente deve dirigir-se a si no WhatsApp e na IA.</p>

    <div class="options">
      <label *ngFor="let op of opcoes" class="opt">
        <input type="radio" name="prefJarvis" [(ngModel)]="escolhaModal" [value]="op.value" />
        <span class="opt-main">{{ op.label }}</span>
        <span class="hint opt-hint" *ngIf="op.hint">{{ op.hint }}</span>
      </label>
    </div>

    <div class="actions">
      <button type="button" class="btn ghost" (click)="fecharModal()" [disabled]="carregando">Cancelar</button>
      <button type="button" class="btn primary" [disabled]="carregando" (click)="salvarPreferencia()">
        Guardar
      </button>
    </div>
  </div>
</div>
