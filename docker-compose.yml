# =========================================================
# 🚀 CONSUMOESPERTO - PRODUÇÃO VPS
# Angular + Spring Boot + PostgreSQL + Redis
# Evolution API + Ollama
# =========================================================
#
# FRONTEND  -> 8181
# BACKEND   -> 8087
# EVOLUTION -> 8585
# OLLAMA    -> 11999
# POSTGRES  -> 5439
#
# =========================================================

services:
  postgres:
    # Imagem oficial com pgvector (RAG/memória Jarvis por embedding). Postgres "vanilla" também funciona —
    # o SchemaAutoPatch cria tabelas com BYTEA até activar CREATE EXTENSION vector.
    image: pgvector/pgvector:pg15
    container_name: consumo_postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-consumo_db}
      POSTGRES_USER: ${POSTGRES_USER:-consumo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5439:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-consumo} -d $${POSTGRES_DB:-consumo_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    container_name: consumo_redis
    restart: always
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: consumo_backend
    restart: always
    ports:
      - "8087:8087"
    environment:
      SERVER_PORT: 8087
      SERVER_FORWARD_HEADERS_STRATEGY: FRAMEWORK

      # Bloco deve ser sempre chave: valor (estilo mapa). Nunca use "- EVOLUTION_..." aqui — em YAML isso vira item de lista e quebra o bloco environment.
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-consumo_db}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-consumo}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}

      JWT_SECRET: ${JWT_SECRET}

      # Dentro da stack Docker usar o servico direto (sem /evolution no path). URLs publicas com proxy falham ou devolvem HTML.
      EVOLUTION_URL: ${EVOLUTION_URL:-http://evolution_api:8585}
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY}
      EVOLUTION_INSTANCE: ${EVOLUTION_INSTANCE:-ConsumoEsperto}
      EVOLUTION_DEDICATED_INSTANCE_PER_USER: ${EVOLUTION_DEDICATED_INSTANCE_PER_USER:-true}
      # URL pública da Evolution (não do frontend) — usada em avisos de QR e Manager
      EVOLUTION_SERVER_URL: ${EVOLUTION_SERVER_URL:-}
      EVOLUTION_MANAGER_URL: ${EVOLUTION_MANAGER_URL:-}

      APP_FRONTEND_BASE_URL: ${APP_FRONTEND_BASE_URL:-https://consumoesperto.brucew07.com.br}
      CORS_ALLOWED_PATTERNS: ${CORS_ALLOWED_PATTERNS:-http://localhost:8181,http://127.0.0.1:8181,https://consumoesperto.brucew07.com.br}

      # Igual ao cliente OAuth "Web" do Google Cloud (mesmo valor que no Angular). O fluxo atual chama UserInfo só com Bearer, mas definir mantém parity e flujos codificados.
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-disabled}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-disabled}

      # Provedores IA — ordem: Groq → OpenAI → Claude → Gemini → DeepSeek → Ollama
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:-}
      CLAUDE_BASE_URL: ${CLAUDE_BASE_URL:-https://api.anthropic.com}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-3-5-haiku-20241022}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_BASE_URL: ${GEMINI_BASE_URL:-https://generativelanguage.googleapis.com/v1beta}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com/v1}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
      TOKEN_SUPPRESSOR_ENABLED: ${TOKEN_SUPPRESSOR_ENABLED:-false}
      TOKEN_SUPPRESSOR_URL: ${TOKEN_SUPPRESSOR_URL:-}
      TOKEN_SUPPRESSOR_API_KEY: ${TOKEN_SUPPRESSOR_API_KEY:-}
      TOKEN_SUPPRESSOR_STRATEGY: ${TOKEN_SUPPRESSOR_STRATEGY:-balanced}
      TOKEN_SUPPRESSOR_MIN_CHARS: ${TOKEN_SUPPRESSOR_MIN_CHARS:-0}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    # Evita proxy reverso Apache/Nginx dar 502 enquanto o Spring Boot ainda arranca (Flyway + contexto pode levar > 30 s).
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8087/api/auth/status > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: consumo_frontend
    restart: always
    ports:
      - "8181:80"
    depends_on:
      backend:
        condition: service_healthy

  evolution_api:
    # Imagem em linha com https://github.com/EvolutionAPI/evolution-api (evoapicloud). Variáveis Redis: CACHE_REDIS_* (REDIS_* sozinho costuma falhar silenciosamente / reset na socket).
    image: evoapicloud/evolution-api:latest
    container_name: consumo_evolution
    restart: always
    ports:
      - "8585:8585"
    environment:
     # URL publica onde a Evolution e alcancavel (ex.: https://dominio:8585 ou https://dominio/evolution).
     # NUNCA use a URL do frontend (APP_FRONTEND_BASE_URL) — /instance/connect devolve {"count":0} sem QR.
     - SERVER_URL=${EVOLUTION_SERVER_URL:-${EVOLUTION_PUBLISH:-http://127.0.0.1:8585}}
     - SERVER_PORT=8585
     - QRCODE_LIMIT=${EVOLUTION_QRCODE_LIMIT:-90}
     # Preto padrão — #198754 (verde) confundia utilizadores e alguns leitores preferem alto contraste
     - QRCODE_COLOR=#000000
     # Vazio = auto; se o scan falhar, defina no .env a versão do fundo do menu WhatsApp Web (ex. 2.3000.1033893291)
     - CONFIG_SESSION_PHONE_VERSION=${CONFIG_SESSION_PHONE_VERSION:-2.3000.1033893291}
     - CONFIG_SESSION_PHONE_CLIENT=${CONFIG_SESSION_PHONE_CLIENT:-Chrome}
     - CONFIG_SESSION_PHONE_NAME=${CONFIG_SESSION_PHONE_NAME:-Chrome}
     - NODE_OPTIONS=--dns-result-order=ipv4first
     - DATABASE_PROVIDER=postgresql
     # Atenção: caracteres especiais na password Postgres (@ : / #) devem estar URL-encoded no URI ou o contentor pode cair durante arranque.
     - DATABASE_CONNECTION_URI=postgresql://${POSTGRES_USER:-consumo}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-consumo_db}?sslmode=disable
     - DATABASE_CONNECTION_CLIENT_NAME=evolution-ce
     - API_TOKEN=${EVOLUTION_API_KEY:-${EVOLUTION_APIKEY}}
     - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY}
     - AUTHENTICATION_TYPE=apikey
     # Alinhado a env oficial da Evolution API v2 (@see evolution-api/env.example)
     - CACHE_REDIS_ENABLED=${EVOLUTION_CACHE_REDIS_ENABLED:-true}
     - CACHE_REDIS_URI=redis://${EVOLUTION_CACHE_REDIS_HOST:-redis}:${EVOLUTION_CACHE_REDIS_PORT:-6379}/${EVOLUTION_CACHE_REDIS_DB:-0}
     - CACHE_REDIS_PREFIX_KEY=${EVOLUTION_CACHE_REDIS_PREFIX_KEY:-evolution-ce}
     - CACHE_LOCAL_ENABLED=true
     - WEBHOOK_GLOBAL_ENABLED=true
     - WEBHOOK_GLOBAL_URL=http://backend:8087/api/public/evolution/webhook
     - WEBHOOK_GLOBAL_COLLECTION_ERRORS=false
     - WEBHOOK_EVENTS_MESSAGES_UPSERT=true
     - WEBHOOK_EVENTS_CONNECTION_UPDATE=true
     - WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS=false
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
    volumes:
      - evolution_data:/evolution/instances

  ollama:
    image: ollama/ollama:latest
    container_name: consumo_ollama
    restart: always
    ports:
      - "11999:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  postgres_data:
  redis_data:
  evolution_data:
  ollama_data:
