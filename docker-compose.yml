# =========================================================
# 🚀 CONSUMOESPERTO - PRODUÇÃO VPS
# Angular + Spring Boot + PostgreSQL + Redis
# Evolution API + Ollama
# =========================================================
#
# FRONTEND  -> 8181
# BACKEND   -> 8087
# EVOLUTION -> 8585
# OLLAMA    -> 11999
# POSTGRES  -> 5439
#
# =========================================================

services:
  postgres:
    image: postgres:15-alpine
    container_name: consumo_postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-consumo_db}
      POSTGRES_USER: ${POSTGRES_USER:-consumo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5439:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-consumo} -d $${POSTGRES_DB:-consumo_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: consumo_redis
    restart: always
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: consumo_backend
    restart: always
    ports:
      - "8087:8087"
    environment:
      SERVER_PORT: 8087
      SERVER_FORWARD_HEADERS_STRATEGY: FRAMEWORK

      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-consumo_db}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-consumo}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}

      JWT_SECRET: ${JWT_SECRET}

      # Dentro da stack Docker usar o servico direto (sem /evolution no path). URLs publicas com proxy falham ou devolvem HTML.
      EVOLUTION_URL: ${EVOLUTION_URL:-http://evolution_api:8585}
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY}
      EVOLUTION_INSTANCE: ${EVOLUTION_INSTANCE:-ConsumoEsperto}

      APP_FRONTEND_BASE_URL: ${APP_FRONTEND_BASE_URL:-https://consumoesperto.brucew07.com.br}
      CORS_ALLOWED_PATTERNS: ${CORS_ALLOWED_PATTERNS:-http://localhost:8181,http://127.0.0.1:8181,https://consumoesperto.brucew07.com.br}

      # Igual ao cliente OAuth "Web" do Google Cloud (mesmo valor que no Angular). O fluxo atual chama UserInfo só com Bearer, mas definir mantém parity e flujos codificados.
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-disabled}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-disabled}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    # Evita proxy reverso Apache/Nginx dar 502 enquanto o Spring Boot ainda arranca (Flyway + contexto pode levar > 30 s).
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8087/api/auth/status > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: consumo_frontend
    restart: always
    ports:
      - "8181:80"
    depends_on:
      backend:
        condition: service_healthy

  evolution_api:
    image: atendai/evolution-api:v2.2.3
    container_name: consumo_evolution
    restart: always
    ports:
      - "8585:8585"
    environment:
     # URL publica onde a Evolution e alcancavel (HTTPS ou host:8585 sem proxy incorrecto).
     # Sem isto REST /instance/connect costuma responder {"count":0} mesmo com QR no Manager.
     - SERVER_URL=${EVOLUTION_SERVER_URL:-${APP_FRONTEND_BASE_URL:-http://localhost:8585}}
     - SERVER_PORT=8585
     - DATABASE_PROVIDER=postgresql
     - DATABASE_CONNECTION_URI=postgresql://${POSTGRES_USER:-consumo}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-consumo_db}?sslmode=disable
     - API_TOKEN=${EVOLUTION_API_KEY:-${EVOLUTION_APIKEY}}
     - CACHE_REDIS_ENABLED=true
     - CACHE_REDIS_HOST=consumo_redis
     - CACHE_REDIS_PORT=6379
     - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY}
     - AUTHENTICATION_TYPE=apikey
    depends_on:
      - redis
      - postgres
    volumes:
      - evolution_data:/evolution/instances

  ollama:
    image: ollama/ollama:latest
    container_name: consumo_ollama
    restart: always
    ports:
      - "11999:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  postgres_data:
  redis_data:
  evolution_data:
  ollama_data:
