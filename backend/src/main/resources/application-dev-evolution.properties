# Perfil de desenvolvimento para Evolution API.
# Use com: SPRING_PROFILES_ACTIVE=dev-evolution

# Carrega secrets locais (nao versionados no git)
spring.config.import=optional:file:./config/application-dev-evolution-secrets.properties

# Provider Evolution (rodar-evolution.bat / npm: porta 8080; Spring com rodar-backend-evolution.bat: 8081)
evolution.url=${EVOLUTION_URL:http://localhost:8080}
evolution.apikey=${EVOLUTION_APIKEY:42abc123}
evolution.instance=${EVOLUTION_INSTANCE:ConsumoEsperto}

# OpenAI (voz + OCR)
openai.api-key=${OPENAI_API_KEY:}
openai.base-url=${OPENAI_BASE_URL:https://api.openai.com/v1}
openai.chat-model=${OPENAI_CHAT_MODEL:gpt-4o-mini}
openai.whisper-model=${OPENAI_WHISPER_MODEL:gpt-4o-mini-transcribe}

# Copilot (endpoint OpenAI-compatible, opcional)
copilot.api-key=${COPILOT_API_KEY:}
copilot.base-url=${COPILOT_BASE_URL:}
copilot.chat-model=${COPILOT_CHAT_MODEL:gpt-4o-mini}
copilot.whisper-model=${COPILOT_WHISPER_MODEL:gpt-4o-mini-transcribe}

# Gemini (fallback para texto/OCR)
gemini.api-key=${GEMINI_API_KEY:}
gemini.base-url=${GEMINI_BASE_URL:https://generativelanguage.googleapis.com/v1beta}
gemini.chat-model=${GEMINI_CHAT_MODEL:gemini-1.5-flash}

# Webhook local na Evolution Node:
# http://localhost:8081/api/public/evolution/webhook
