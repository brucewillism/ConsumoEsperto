# Configuração de Logs Otimizada
# Este arquivo configura logs mais eficientes para produção

# Configuração do Logback
logging.level.root=INFO
logging.level.com.consumoesperto=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN

# Configuração de arquivos de log
logging.file.name=logs/consumo-esperto.log
logging.file.max-size=10MB
logging.file.max-history=30
logging.file.total-size-cap=1GB

# Formato dos logs
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Configuração específica para produção
logging.level.org.springframework.boot.autoconfigure=WARN
logging.level.org.springframework.boot.context.embedded=WARN
logging.level.org.springframework.boot.web.servlet=WARN
logging.level.org.springframework.boot.actuate=WARN

# Configuração de logs de segurança
logging.level.org.springframework.security.web=INFO
logging.level.org.springframework.security.core=INFO
logging.level.org.springframework.security.authentication=INFO

# Configuração de logs de banco de dados
logging.level.org.springframework.jdbc=WARN
logging.level.org.springframework.orm=WARN
logging.level.org.springframework.transaction=WARN

# Configuração de logs de cache
