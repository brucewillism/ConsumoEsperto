# ========================================
# CONFIGURAÇÃO DAS APIS BANCÁRIAS
# ========================================

# ========================================
# ITAÚ - Open Banking
# ========================================
bank.api.itau.name=Itaú
bank.api.itau.client-id=${ITAU_CLIENT_ID:your_itau_client_id}
bank.api.itau.client-secret=${ITAU_CLIENT_SECRET:your_itau_client_secret}
bank.api.itau.sandbox=true
bank.api.itau.auth-url=https://openbanking.itau.com.br/oauth/authorize
bank.api.itau.token-url=https://openbanking.itau.com.br/oauth/token
bank.api.itau.api-url=https://openbanking.itau.com.br/api
bank.api.itau.scope=openid,profile,email,accounts,transactions
bank.api.itau.redirect-uri=${NGROK_URL:https://29e1b0b32eb8.ngrok-free.app}/api/auth/itau/callback

# ========================================
# MERCADO PAGO
# ========================================
bank.api.mercadopago.name=Mercado Pago
bank.api.mercadopago.client-id=${MERCADOPAGO_CLIENT_ID:4223603750190943}
bank.api.mercadopago.client-secret=${MERCADOPAGO_CLIENT_SECRET:APP_USR-4223603750190943-XXXXXX}
bank.api.mercadopago.user-id=${MERCADOPAGO_USER_ID:209112973}
bank.api.mercadopago.sandbox=true
bank.api.mercadopago.auth-url=https://api.mercadopago.com/authorization
bank.api.mercadopago.token-url=https://api.mercadopago.com/oauth/token
bank.api.mercadopago.api-url=https://api.mercadopago.com/v1
bank.api.mercadopago.scope=read,write
bank.api.mercadopago.redirect-uri=${NGROK_URL:https://29e1b0b32eb8.ngrok-free.app}/api/auth/mercadopago/callback

# ========================================
# INTER - Open Banking
# ========================================
bank.api.inter.name=Inter
bank.api.inter.client-id=${INTER_CLIENT_ID:your_inter_client_id}
bank.api.inter.client-secret=${INTER_CLIENT_SECRET:your_inter_client_secret}
bank.api.inter.sandbox=true
bank.api.inter.auth-url=https://cdp.openbanking.bancointer.com.br/oauth/authorize
bank.api.inter.token-url=https://cdp.openbanking.bancointer.com.br/oauth/token
bank.api.inter.api-url=https://cdp.openbanking.bancointer.com.br/api
bank.api.inter.scope=openid,profile,email,accounts,transactions
bank.api.inter.redirect-uri=${NGROK_URL:https://29e1b0b32eb8.ngrok-free.app}/api/auth/inter/callback

# ========================================
# NUBANK (Open Banking - quando disponível)
# ========================================
bank.api.nubank.name=Nubank
bank.api.nubank.client-id=${NUBANK_CLIENT_ID:your_nubank_client_id}
bank.api.nubank.client-secret=${NUBANK_CLIENT_SECRET:your_nubank_client_secret}
bank.api.nubank.sandbox=true
bank.api.nubank.auth-url=https://api.nubank.com.br/oauth/authorize
bank.api.nubank.token-url=https://api.nubank.com.br/oauth/token
bank.api.nubank.api-url=https://api.nubank.com.br/api
bank.api.nubank.scope=openid,profile,email,accounts,transactions
bank.api.nubank.redirect-uri=${NGROK_URL:https://29e1b0b32eb8.ngrok-free.app}/api/auth/nubank/callback

# ========================================
# CONFIGURAÇÕES GERAIS
# ========================================
bank.api.timeout=30000
bank.api.max-retries=3
bank.api.retry-delay=1000

# ========================================
# CONFIGURAÇÕES DE LOG
# ========================================
logging.level.com.consumoesperto.service.bank=DEBUG
logging.level.org.springframework.web.client=DEBUG
