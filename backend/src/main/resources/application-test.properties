# Configurações de Teste com Oracle

# Configurações do Banco de Dados Oracle para Testes
spring.datasource.url=jdbc:oracle:thin:@localhost:1521:XE
spring.datasource.username=consumo_esperto
spring.datasource.password=consumo_esperto123
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# Configurações JPA/Hibernate para Testes
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.OracleDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.hbm2ddl.auto=create-drop

# Configurações específicas do Oracle
spring.jpa.properties.hibernate.connection.charSet=UTF-8
spring.jpa.properties.hibernate.connection.characterEncoding=UTF-8
spring.jpa.properties.hibernate.connection.useUnicode=true

# Configurações de Pool de Conexões para Testes
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=900000

# Logs para testes
logging.level.com.consumoesperto=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.jdbc=DEBUG
