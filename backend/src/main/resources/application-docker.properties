# Configurações de Desenvolvimento com Oracle Docker

# Configurações do Banco de Dados Oracle Docker
spring.datasource.url=jdbc:oracle:thin:@localhost:1521:XE
spring.datasource.username=consumo_esperto
spring.datasource.password=consumo_esperto123
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# Configurações JPA/Hibernate para Desenvolvimento Docker
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.OracleDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.hbm2ddl.auto=create-drop

# Configurações específicas do Oracle
spring.jpa.properties.hibernate.connection.charSet=UTF-8
spring.jpa.properties.hibernate.connection.characterEncoding=UTF-8
spring.jpa.properties.hibernate.connection.useUnicode=true

# Configurações de Pool de Conexões para Docker
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Logs detalhados para desenvolvimento
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.com.consumoesperto=DEBUG
logging.level.org.springframework.jdbc=DEBUG
