<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuração de APIs Bancárias - ConsumoEsperto</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    
    <style>
        .config-card {
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .config-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .status-badge {
            font-size: 0.8rem;
        }
        .bank-icon {
            width: 40px;
            height: 40px;
            object-fit: contain;
        }
        .stats-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .stats-card.success {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }
        .stats-card.warning {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        .stats-card.info {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }
    </style>
</head>
<body>
    <!-- Header -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="bi bi-bank2 me-2"></i>
                ConsumoEsperto - Configuração de APIs
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/">
                    <i class="bi bi-house me-1"></i>
                    Voltar ao Início
                </a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <!-- Dashboard -->
        <div class="row mb-4">
            <div class="col-12">
                <h2 class="mb-3">
                    <i class="bi bi-gear-fill me-2"></i>
                    Dashboard de Configurações Bancárias
                </h2>
            </div>
        </div>

        <!-- Estatísticas -->
        <div class="row mb-4" id="statsContainer">
            <div class="col-md-3 mb-3">
                <div class="card stats-card text-white">
                    <div class="card-body text-center">
                        <i class="bi bi-bank2 fs-1 mb-2"></i>
                        <h5 class="card-title">Total</h5>
                        <h3 id="totalConfigs">0</h3>
                    </div>
                </div>
            </div>
            <div class="col-md-3 mb-3">
                <div class="card stats-card success text-white">
                    <div class="card-body text-center">
                        <i class="bi bi-check-circle fs-1 mb-2"></i>
                        <h5 class="card-title">Ativas</h5>
                        <h3 id="activeConfigs">0</h3>
                    </div>
                </div>
            </div>
            <div class="col-md-3 mb-3">
                <div class="card stats-card warning text-white">
                    <div class="card-body text-center">
                        <i class="bi bi-exclamation-triangle fs-1 mb-2"></i>
                        <h5 class="card-title">Falharam</h5>
                        <h3 id="failedTests">0</h3>
                    </div>
                </div>
            </div>
            <div class="col-md-3 mb-3">
                <div class="card stats-card info text-white">
                    <div class="card-body text-center">
                        <i class="bi bi-question-circle fs-1 mb-2"></i>
                        <h5 class="card-title">Pendentes</h5>
                        <h3 id="pendingTests">0</h3>
                    </div>
                </div>
            </div>
        </div>

        <!-- Ações -->
        <div class="row mb-4">
            <div class="col-12">
                <div class="d-flex justify-content-between align-items-center">
                    <h4>
                        <i class="bi bi-list-ul me-2"></i>
                        Minhas Configurações
                    </h4>
                    <div>
                        <button class="btn btn-success me-2" onclick="createDefaultConfigs()">
                            <i class="bi bi-plus-circle me-1"></i>
                            Criar Configurações Padrão
                        </button>
                        <button class="btn btn-primary" onclick="showAddModal()">
                            <i class="bi bi-plus-circle me-1"></i>
                            Nova Configuração
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Lista de Configurações -->
        <div class="row" id="configsContainer">
            <div class="col-12">
                <div class="text-center py-5">
                    <i class="bi bi-arrow-clockwise fs-1 text-muted"></i>
                    <p class="text-muted">Carregando configurações...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Adicionar/Editar Configuração -->
    <div class="modal fade" id="configModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">Nova Configuração Bancária</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="configForm">
                        <input type="hidden" id="configId">
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="bankName" class="form-label">Nome do Banco *</label>
                                <input type="text" class="form-control" id="bankName" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="bankCode" class="form-label">Código do Banco *</label>
                                <select class="form-select" id="bankCode" required>
                                    <option value="">Selecione...</option>
                                    <option value="MERCADOPAGO">Mercado Pago</option>
                                    <option value="ITAU">Itaú</option>
                                    <option value="INTER">Inter</option>
                                    <option value="NUBANK">Nubank</option>
                                </select>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="clientId" class="form-label">Client ID *</label>
                                <input type="text" class="form-control" id="clientId" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="clientSecret" class="form-label">Client Secret *</label>
                                <input type="password" class="form-control" id="clientSecret" required>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="userId" class="form-label">User ID</label>
                                <input type="text" class="form-control" id="userId" placeholder="Opcional">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="apiUrl" class="form-label">URL da API *</label>
                                <input type="url" class="form-control" id="apiUrl" required>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="authUrl" class="form-label">URL de Autorização</label>
                                <input type="url" class="form-control" id="authUrl">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="tokenUrl" class="form-label">URL do Token</label>
                                <input type="url" class="form-control" id="tokenUrl">
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="redirectUri" class="form-label">URI de Redirecionamento</label>
                                <input type="url" class="form-control" id="redirectUri">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="scope" class="form-label">Escopo</label>
                                <input type="text" class="form-control" id="scope" placeholder="openid,profile,email">
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label for="timeoutMs" class="form-label">Timeout (ms)</label>
                                <input type="number" class="form-control" id="timeoutMs" value="30000" min="1000">
                            </div>
                            <div class="col-md-4 mb-3">
                                <label for="maxRetries" class="form-label">Máx. Tentativas</label>
                                <input type="number" class="form-control" id="maxRetries" value="3" min="1" max="10">
                            </div>
                            <div class="col-md-4 mb-3">
                                <label for="retryDelayMs" class="form-label">Delay (ms)</label>
                                <input type="number" class="form-control" id="retryDelayMs" value="1000" min="100">
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="isSandbox" checked>
                                    <label class="form-check-label" for="isSandbox">
                                        Modo Sandbox
                                    </label>
                                </div>
                            </div>
                            <div class="col-md-6 mb-3">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="isActive" checked>
                                    <label class="form-check-label" for="isActive">
                                        Configuração Ativa
                                    </label>
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" onclick="saveConfig()">Salvar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal de Confirmação -->
    <div class="modal fade" id="confirmModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Confirmar Ação</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p id="confirmMessage">Tem certeza que deseja realizar esta ação?</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-danger" id="confirmButton">Confirmar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    
    <script>
        let configs = [];
        let editingConfig = null;

        // Configuração do Axios
        axios.defaults.baseURL = '/api';
        
        // Interceptor para adicionar token de autenticação
        axios.interceptors.request.use(function (config) {
            const token = localStorage.getItem('token');
            if (token) {
                config.headers.Authorization = `Bearer ${token}`;
            }
            return config;
        });

        // Carregar configurações ao iniciar
        document.addEventListener('DOMContentLoaded', function() {
            loadConfigs();
            loadStats();
        });

        // Carregar configurações do usuário
        async function loadConfigs() {
            try {
                const response = await axios.get('/bank-config/my-configs');
                configs = response.data;
                renderConfigs();
            } catch (error) {
                console.error('Erro ao carregar configurações:', error);
                showError('Erro ao carregar configurações');
            }
        }

        // Carregar estatísticas do usuário
        async function loadStats() {
            try {
                const response = await axios.get('/bank-config/stats/my-stats');
                updateStats(response.data);
            } catch (error) {
                console.error('Erro ao carregar estatísticas:', error);
            }
        }

        // Renderizar configurações
        function renderConfigs() {
            const container = document.getElementById('configsContainer');
            
            if (configs.length === 0) {
                container.innerHTML = `
                    <div class="col-12">
                        <div class="text-center py-5">
                            <i class="bi bi-bank2 fs-1 text-muted"></i>
                            <h5 class="text-muted mt-3">Nenhuma configuração encontrada</h5>
                            <p class="text-muted">Clique em "Criar Configurações Padrão" para começar</p>
                        </div>
                    </div>
                `;
                return;
            }

            container.innerHTML = configs.map(config => `
                <div class="col-md-6 col-lg-4 mb-3">
                    <div class="card config-card h-100">
                        <div class="card-header d-flex justify-content-between align-items-center">
                            <div class="d-flex align-items-center">
                                <img src="/images/banks/${config.bankCode.toLowerCase()}.png" 
                                     alt="${config.bankName}" 
                                     class="bank-icon me-2"
                                     onerror="this.src='/images/banks/default.png'">
                                <h6 class="mb-0">${config.bankName}</h6>
                            </div>
                            <div class="dropdown">
                                <button class="btn btn-sm btn-outline-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown">
                                    <i class="bi bi-three-dots-vertical"></i>
                                </button>
                                <ul class="dropdown-menu">
                                    <li><a class="dropdown-item" href="#" onclick="editConfig(${config.id})">
                                        <i class="bi bi-pencil me-2"></i>Editar
                                    </a></li>
                                    <li><a class="dropdown-item" href="#" onclick="testConnection(${config.id})">
                                        <i class="bi bi-play-circle me-2"></i>Testar Conexão
                                    </a></li>
                                    <li><a class="dropdown-item" href="#" onclick="toggleActive(${config.id})">
                                        <i class="bi bi-toggle-${config.isActive ? 'on' : 'off'} me-2"></i>
                                        ${config.isActive ? 'Desativar' : 'Ativar'}
                                    </a></li>
                                    <li><hr class="dropdown-divider"></li>
                                    <li><a class="dropdown-item text-danger" href="#" onclick="deleteConfig(${config.id})">
                                        <i class="bi bi-trash me-2"></i>Remover
                                    </a></li>
                                </ul>
                            </div>
                        </div>
                        <div class="card-body">
                            <div class="mb-2">
                                <small class="text-muted">Código:</small>
                                <span class="badge bg-secondary">${config.bankCode}</span>
                            </div>
                            <div class="mb-2">
                                <small class="text-muted">Status:</small>
                                <span class="badge ${config.isActive ? 'bg-success' : 'bg-secondary'} status-badge">
                                    ${config.isActive ? 'Ativo' : 'Inativo'}
                                </span>
                            </div>
                            <div class="mb-2">
                                <small class="text-muted">Ambiente:</small>
                                <span class="badge ${config.isSandbox ? 'bg-warning' : 'bg-info'} status-badge">
                                    ${config.isSandbox ? 'Sandbox' : 'Produção'}
                                </span>
                            </div>
                            <div class="mb-2">
                                <small class="text-muted">Último Teste:</small>
                                <span class="badge ${getTestStatusBadge(config.lastTestStatus)} status-badge">
                                    ${getTestStatusText(config.lastTestStatus)}
                                </span>
                            </div>
                            <div class="mb-2">
                                <small class="text-muted">Atualizado:</small>
                                <br>
                                <small>${formatDateTime(config.updatedAt)}</small>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Atualizar estatísticas
        function updateStats(stats) {
            document.getElementById('totalConfigs').textContent = stats.total || 0;
            document.getElementById('activeConfigs').textContent = stats.active || 0;
            document.getElementById('failedTests').textContent = stats.testsFailed || 0;
            document.getElementById('pendingTests').textContent = stats.testsNotTested || 0;
        }

        // Mostrar modal de adição
        function showAddModal() {
            editingConfig = null;
            document.getElementById('modalTitle').textContent = 'Nova Configuração Bancária';
            document.getElementById('configForm').reset();
            document.getElementById('configId').value = '';
            
            // Valores padrão
            document.getElementById('timeoutMs').value = '30000';
            document.getElementById('maxRetries').value = '3';
            document.getElementById('retryDelayMs').value = '1000';
            document.getElementById('isSandbox').checked = true;
            document.getElementById('isActive').checked = true;
            
            new bootstrap.Modal(document.getElementById('configModal')).show();
        }

        // Editar configuração
        function editConfig(id) {
            const config = configs.find(c => c.id === id);
            if (!config) return;

            editingConfig = config;
            document.getElementById('modalTitle').textContent = 'Editar Configuração Bancária';
            
            // Preencher formulário
            document.getElementById('configId').value = config.id;
            document.getElementById('bankName').value = config.bankName;
            document.getElementById('bankCode').value = config.bankCode;
            document.getElementById('clientId').value = config.clientId;
            document.getElementById('clientSecret').value = config.clientSecret;
            document.getElementById('userId').value = config.userId || '';
            document.getElementById('apiUrl').value = config.apiUrl;
            document.getElementById('authUrl').value = config.authUrl || '';
            document.getElementById('tokenUrl').value = config.tokenUrl || '';
            document.getElementById('redirectUri').value = config.redirectUri || '';
            document.getElementById('scope').value = config.scope || '';
            document.getElementById('timeoutMs').value = config.timeoutMs;
            document.getElementById('maxRetries').value = config.maxRetries;
            document.getElementById('retryDelayMs').value = config.retryDelayMs;
            document.getElementById('isSandbox').checked = config.isSandbox;
            document.getElementById('isActive').checked = config.isActive;
            
            new bootstrap.Modal(document.getElementById('configModal')).show();
        }

        // Salvar configuração
        async function saveConfig() {
            const form = document.getElementById('configForm');
            if (!form.checkValidity()) {
                form.reportValidity();
                return;
            }

            const configData = {
                bankName: document.getElementById('bankName').value,
                bankCode: document.getElementById('bankCode').value,
                clientId: document.getElementById('clientId').value,
                clientSecret: document.getElementById('clientSecret').value,
                userId: document.getElementById('userId').value || null,
                apiUrl: document.getElementById('apiUrl').value,
                authUrl: document.getElementById('authUrl').value || null,
                tokenUrl: document.getElementById('tokenUrl').value || null,
                redirectUri: document.getElementById('redirectUri').value || null,
                scope: document.getElementById('scope').value || null,
                timeoutMs: parseInt(document.getElementById('timeoutMs').value),
                maxRetries: parseInt(document.getElementById('maxRetries').value),
                retryDelayMs: parseInt(document.getElementById('retryDelayMs').value),
                isSandbox: document.getElementById('isSandbox').checked,
                isActive: document.getElementById('isActive').checked
            };

            try {
                if (editingConfig) {
                    // Atualizar
                    await axios.put(`/bank-config/my-configs/${editingConfig.id}`, configData);
                    showSuccess('Configuração atualizada com sucesso!');
                } else {
                    // Criar
                    await axios.post('/bank-config/my-configs', configData);
                    showSuccess('Configuração criada com sucesso!');
                }
                
                bootstrap.Modal.getInstance(document.getElementById('configModal')).hide();
                loadConfigs();
                loadStats();
            } catch (error) {
                console.error('Erro ao salvar configuração:', error);
                showError('Erro ao salvar configuração');
            }
        }

        // Testar conexão
        async function testConnection(id) {
            try {
                await axios.post(`/bank-config/my-configs/${id}/test`);
                showSuccess('Conexão testada com sucesso!');
                loadConfigs();
                loadStats();
            } catch (error) {
                console.error('Erro ao testar conexão:', error);
                showError('Erro ao testar conexão');
            }
        }

        // Alternar status ativo
        async function toggleActive(id) {
            try {
                await axios.patch(`/bank-config/my-configs/${id}/toggle`);
                showSuccess('Status alterado com sucesso!');
                loadConfigs();
                loadStats();
            } catch (error) {
                console.error('Erro ao alterar status:', error);
                showError('Erro ao alterar status');
            }
        }

        // Remover configuração
        function deleteConfig(id) {
            const config = configs.find(c => c.id === id);
            if (!config) return;

            showConfirmModal(
                `Tem certeza que deseja remover a configuração "${config.bankName}"?`,
                () => performDelete(id)
            );
        }

        // Executar remoção
        async function performDelete(id) {
            try {
                await axios.delete(`/bank-config/my-configs/${id}`);
                showSuccess('Configuração removida com sucesso!');
                loadConfigs();
                loadStats();
            } catch (error) {
                console.error('Erro ao remover configuração:', error);
                showError('Erro ao remover configuração');
            }
        }

        // Criar configurações padrão
        async function createDefaultConfigs() {
            try {
                await axios.post('/bank-config/my-configs/create-defaults');
                showSuccess('Configurações padrão criadas com sucesso!');
                loadConfigs();
                loadStats();
            } catch (error) {
                console.error('Erro ao criar configurações padrão:', error);
                showError('Erro ao criar configurações padrão');
            }
        }

        // Mostrar modal de confirmação
        function showConfirmModal(message, onConfirm) {
            document.getElementById('confirmMessage').textContent = message;
            document.getElementById('confirmButton').onclick = () => {
                onConfirm();
                bootstrap.Modal.getInstance(document.getElementById('confirmModal')).hide();
            };
            new bootstrap.Modal(document.getElementById('confirmModal')).show();
        }

        // Utilitários
        function getTestStatusBadge(status) {
            switch (status) {
                case 'SUCCESS': return 'bg-success';
                case 'FAILED': return 'bg-danger';
                case 'NOT_TESTED': return 'bg-secondary';
                default: return 'bg-secondary';
            }
        }

        function getTestStatusText(status) {
            switch (status) {
                case 'SUCCESS': return 'Sucesso';
                case 'FAILED': return 'Falhou';
                case 'NOT_TESTED': return 'Não Testado';
                default: return 'Não Testado';
            }
        }

        function formatDateTime(dateTime) {
            if (!dateTime) return 'N/A';
            return new Date(dateTime).toLocaleString('pt-BR');
        }

        function showSuccess(message) {
            // Implementar notificação de sucesso
            alert(message);
        }

        function showError(message) {
            // Implementar notificação de erro
            alert('Erro: ' + message);
        }
    </script>
</body>
</html>
