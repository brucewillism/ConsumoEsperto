# =============================================================================
# CONFIGURAÇÃO DE DESENVOLVIMENTO - SEM OAUTH2
# =============================================================================

# Configurações básicas
server.port=8080
spring.application.name=consumo-esperto-backend
spring.profiles.active=dev

# Configurações PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/consumoesperto
spring.datasource.username=bruce
spring.datasource.password=0301HeX@
spring.datasource.driver-class-name=org.postgresql.Driver

# Pool de conexões HikariCP
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# Configuração JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Desabilitar cache do Hibernate
spring.jpa.properties.hibernate.cache.use_second_level_cache=false
spring.jpa.properties.hibernate.cache.use_query_cache=false

# Configurações de segurança básicas
spring.security.user.name=admin
spring.security.user.password=admin123
spring.security.user.roles=ADMIN

# Desabilitar OAuth2
oauth2.enabled=false

# Configurações de logging
logging.level.com.consumoesperto=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Configurações de CORS
spring.web.cors.allowed-origins=http://localhost:4200
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# Configurações de actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
