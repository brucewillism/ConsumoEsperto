# Configurações para desenvolvimento local
# Este arquivo é carregado automaticamente quando spring.profiles.active=dev

# =============================================================================
# CONFIGURAÇÕES BÁSICAS
# =============================================================================
spring.application.name=consumo-esperto-backend
server.port=8080

# =============================================================================
# CONFIGURAÇÕES POSTGRESQL
# =============================================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/consumoesperto
spring.datasource.username=${DATABASE_USERNAME:bruce}
spring.datasource.password=${DATABASE_PASSWORD:0301HeX@}
spring.datasource.driver-class-name=org.postgresql.Driver

# =============================================================================
# CONFIGURAÇÕES JWT
# =============================================================================
jwt.secret=${JWT_SECRET:consumoesperto_jwt_secret_key_2024_development_very_long_and_secure_key}
jwt.expiration=86400000

# =============================================================================
# CONFIGURAÇÕES DE LOG
# =============================================================================
logging.level.com.consumoesperto=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN

# =============================================================================
# CONFIGURAÇÕES DE DESENVOLVIMENTO
# =============================================================================
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.hibernate.ddl-auto=none

# =============================================================================
# CONFIGURAÇÕES DE CORS
# =============================================================================
cors.allowed-origins=http://localhost:4200,https://f03db4701c9f.ngrok-free.app
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=*
cors.allow-credentials=true

# =============================================================================
# CONFIGURAÇÕES DE SEGURANÇA
# =============================================================================
encryption.secret.key=consumoesperto_encryption_key_2024_development

# =============================================================================
# WHATSAPP COMMAND CENTER (TWILIO + OPENAI)
# =============================================================================
whatsapp.default-user-id=${WHATSAPP_DEFAULT_USER_ID:}
whatsapp.twilio.account-sid=${TWILIO_ACCOUNT_SID:}
whatsapp.twilio.auth-token=${TWILIO_AUTH_TOKEN:}
whatsapp.twilio.from-number=${TWILIO_WHATSAPP_FROM:whatsapp:+14155238886}
openai.api-key=${OPENAI_API_KEY:}
openai.base-url=${OPENAI_BASE_URL:https://api.openai.com/v1}
openai.chat-model=${OPENAI_CHAT_MODEL:gpt-4o-mini}
openai.whisper-model=${OPENAI_WHISPER_MODEL:gpt-4o-mini-transcribe}

# =============================================================================
# EVOLUTION API (respostas WhatsApp — o webhook já chega na 8080; isto é para ENVIAR texto de volta)
# Mesma AUTHENTICATION_API_KEY que em tools/evolution-api/.env (ou defina EVOLUTION_API_KEY / EVOLUTION_URL).
# =============================================================================
evolution.url=${EVOLUTION_URL:http://localhost:8081}
evolution.apikey=${EVOLUTION_APIKEY:42abc123}
evolution.instance=${EVOLUTION_INSTANCE:ConsumoEsperto}