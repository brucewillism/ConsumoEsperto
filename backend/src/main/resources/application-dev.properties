# =============================================================================
# CONFIGURAÇÕES DE DESENVOLVIMENTO - CONSUMO ESPERTO
# =============================================================================
# Este arquivo contém configurações específicas para o ambiente de desenvolvimento
# Inclui configurações do banco Oracle e Google OAuth2

# =============================================================================
# CONFIGURAÇÕES DO BANCO DE DADOS ORACLE
# =============================================================================
# Driver JDBC para Oracle
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# String de conexão para Oracle XE local
spring.datasource.url=jdbc:oracle:thin:@localhost:1521:XE

# Credenciais do banco Oracle
spring.datasource.username=consumo_esperto
spring.datasource.password=consumo_esperto123

# =============================================================================
# CONFIGURAÇÕES HIBERNATE PARA DESENVOLVIMENTO
# =============================================================================
# Estratégia de criação das tabelas
# create-drop: recria as tabelas a cada execução (desenvolvimento)
# update: atualiza as tabelas existentes (produção)
spring.jpa.hibernate.ddl-auto=update

# Mostrar SQL no console para debugging
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Configurações de performance para desenvolvimento
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# =============================================================================
# CONFIGURAÇÕES DO GOOGLE OAUTH2
# =============================================================================
# Credenciais para autenticação via Google
# IMPORTANTE: Configure estas credenciais no Google Cloud Console
spring.security.oauth2.client.registration.google.client-id=593452038228-47k24odoa6f18c78e3ssp9bhu56gugnm.apps.googleusercontent.com
spring.security.oauth2.client.registration.google.client-secret=GOCSPX-your_google_client_secret_here
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/api/auth/google/callback

# =============================================================================
# CONFIGURAÇÕES DE SEGURANÇA PARA DESENVOLVIMENTO
# =============================================================================
# Permitir CORS de localhost para desenvolvimento
spring.web.cors.allowed-origins=http://localhost:4200,http://localhost:3000
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*

# =============================================================================
# CONFIGURAÇÕES DE LOG PARA DESENVOLVIMENTO
# =============================================================================
# Log detalhado para debugging
logging.level.com.consumoesperto=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG

