# =============================================================================
# CONFIGURAÇÕES DE DESENVOLVIMENTO - CONSUMO ESPERTO
# =============================================================================
# Este arquivo contém as configurações específicas para o ambiente
# de desenvolvimento, incluindo banco Oracle, logs detalhados e
# configurações de debug do Hibernate.
# =============================================================================

# =============================================================================
# CONFIGURAÇÕES DO BANCO DE DADOS ORACLE PARA DESENVOLVIMENTO
# =============================================================================
# URL de conexão com o banco Oracle XE local
# Formato: jdbc:oracle:thin:@host:porta:sid
spring.datasource.url=jdbc:oracle:thin:@localhost:1521:XE

# Credenciais de acesso ao banco Oracle
# Usuário criado especificamente para a aplicação ConsumoEsperto
spring.datasource.username=consumo_esperto

# Senha do usuário do banco (altere em produção)
spring.datasource.password=consumo_esperto123

# Driver JDBC do Oracle para conexão com o banco
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# =============================================================================
# CONFIGURAÇÕES JPA/HIBERNATE PARA DESENVOLVIMENTO
# =============================================================================
# Estratégia de criação das tabelas: create-drop (recria a cada execução)
# ATENÇÃO: Em produção, use 'validate' ou 'none'
spring.jpa.hibernate.ddl-auto=create-drop

# Exibe as consultas SQL no console para debug
spring.jpa.show-sql=true

# Dialect específico do Oracle para otimizações e compatibilidade
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.OracleDialect

# Formata as consultas SQL para melhor legibilidade no log
spring.jpa.properties.hibernate.format_sql=true

# Configuração alternativa para criação automática de tabelas
spring.jpa.properties.hibernate.hbm2ddl.auto=create-drop

# =============================================================================
# CONFIGURAÇÕES ESPECÍFICAS DO ORACLE
# =============================================================================
# Configurações de codificação para suporte completo a caracteres UTF-8
# Essencial para nomes brasileiros, acentos e caracteres especiais
spring.jpa.properties.hibernate.connection.charSet=UTF-8
spring.jpa.properties.hibernate.connection.characterEncoding=UTF-8
spring.jpa.properties.hibernate.connection.useUnicode=true

# =============================================================================
# LOGS MAIS DETALHADOS PARA DESENVOLVIMENTO
# =============================================================================
# Exibe todas as consultas SQL executadas pelo Hibernate
logging.level.org.hibernate.SQL=DEBUG

# Exibe os parâmetros das consultas SQL para debug completo
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Logs de debug para a aplicação ConsumoEsperto
logging.level.com.consumoesperto=DEBUG
