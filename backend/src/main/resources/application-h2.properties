# =============================================================================
# CONFIGURAÇÕES DO BANCO DE DADOS H2 - CONSUMO ESPERTO
# =============================================================================
# Este arquivo contém as configurações para o banco de dados H2 em memória.
# O H2 é usado como alternativa ao Oracle para desenvolvimento rápido,
# testes e situações onde o Oracle não está disponível.
# 
# Vantagens do H2:
# - Inicialização rápida (em memória)
# - Não requer instalação de banco
# - Ideal para desenvolvimento e testes
# - Console web para visualização dos dados
# =============================================================================

# =============================================================================
# CONFIGURAÇÕES DO BANCO DE DADOS H2
# =============================================================================
# URL de conexão com o banco H2 em memória
# Formato: jdbc:h2:mem:nome_do_banco
# O banco é criado em memória e destruído quando a aplicação para
spring.datasource.url=jdbc:h2:mem:consumo_esperto

# Usuário padrão do H2 (sa = system administrator)
spring.datasource.username=sa

# Senha vazia para o usuário padrão (configuração de desenvolvimento)
spring.datasource.password=

# Driver JDBC do H2 para conexão com o banco
spring.datasource.driver-class-name=org.h2.Driver

# =============================================================================
# CONFIGURAÇÕES JPA/HIBERNATE PARA H2
# =============================================================================
# Estratégia de criação das tabelas: create-drop (recria a cada execução)
# Ideal para desenvolvimento e testes, pois garante banco limpo
spring.jpa.hibernate.ddl-auto=create-drop

# Exibe as consultas SQL no console para debug
spring.jpa.show-sql=true

# Dialect específico do H2 para otimizações e compatibilidade
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Formata as consultas SQL para melhor legibilidade no log
spring.jpa.properties.hibernate.format_sql=true

# =============================================================================
# CONSOLE H2 - INTERFACE WEB PARA VISUALIZAÇÃO DOS DADOS
# =============================================================================
# Habilita o console web do H2 para acessar o banco via navegador
spring.h2.console.enabled=true

# Caminho para acessar o console H2: http://localhost:8080/h2-console
spring.h2.console.path=/h2-console

# =============================================================================
# LOGS PARA DESENVOLVIMENTO
# =============================================================================
# Logs de debug para a aplicação ConsumoEsperto
logging.level.com.consumoesperto=DEBUG

# Exibe todas as consultas SQL executadas pelo Hibernate
logging.level.org.hibernate.SQL=DEBUG

