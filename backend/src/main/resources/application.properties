consumoesperto.ai.token-suppressor.strategy=${TOKEN_SUPPRESSOR_STRATEGY:balanced}
consumoesperto.ai.token-suppressor.min-chars=${TOKEN_SUPPRESSOR_MIN_CHARS:0}
consumoesperto.ai.token-suppressor.timeout-ms=${TOKEN_SUPPRESSOR_TIMEOUT_MS:120000}

# Persona J.A.R.V.I.S. (opcional): vocativo fixo e tom britânico nos prompts de IA
