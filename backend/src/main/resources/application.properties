# Evolution API (WhatsApp provider)
# Em producao defina EVOLUTION_APIKEY / EVOLUTION_INSTANCE. Padrao local alinha ao script scripts/sincronizar-evolution-env.ps1; opcionalmente o script gera backend/config/application-dev-evolution-secrets.properties (import no fim deste ficheiro).
evolution.url=${EVOLUTION_URL:http://localhost:18080}
# Compose/Docker pode usar EVOLUTION_API_KEY; dev local costuma usar EVOLUTION_APIKEY (alias sem underscore).
evolution.apikey=${EVOLUTION_APIKEY:${EVOLUTION_API_KEY:}}
evolution.instance=${EVOLUTION_INSTANCE:ConsumoEsperto}
# Pareamento WhatsApp (GET /instance/connect): a Evolution aguarda ~2 s após connect quando state=close; valores por defeito dão várias tentativas longas.
evolution.pairing.connect.retries=${EVOLUTION_PAIRING_CONNECT_RETRIES:6}
evolution.pairing.connect.pauseMs=${EVOLUTION_PAIRING_CONNECT_PAUSE_MS:4000}
# Cache curto credenciais + numero no polling do modal (reduz Hibernate). LOG_WEAK: diagnostico quando REST não traz QR.
evolution.pairing.cred-cache-ms=${EVOLUTION_PAIRING_CRED_CACHE_MS:25000}
evolution.pairing.log-weak-response=${EVOLUTION_PAIRING_LOG_WEAK:false}
# Uma instância Evolution por utilizador (ce-u{id}) — evita conflito de QR/sessão na instância global ConsumoEsperto.
consumoesperto.evolution.dedicated-instance-per-user=${EVOLUTION_DEDICATED_INSTANCE_PER_USER:true}
# URL pública da Evolution (SERVER_URL no contentor). Obrigatória para QR via REST — não confundir com o frontend.
consumoesperto.evolution.public-url=${EVOLUTION_SERVER_URL:}
consumoesperto.evolution.manager-url=${EVOLUTION_MANAGER_URL:${EVOLUTION_SERVER_URL:http://127.0.0.1:8585}/manager}
# Webhook por instância (POST /webhook/set/{instance}); no Docker use o serviço backend interno.
consumoesperto.evolution.webhook.url=${EVOLUTION_WEBHOOK_BACKEND_URL:http://backend:8087/api/public/evolution/webhook}
# Modo fantasma Evolution (Baileys): evita online 24h e leitura automática que silencia notificações no telemóvel
consumoesperto.evolution.privacy.always-online=${EVOLUTION_ALWAYS_ONLINE:false}
consumoesperto.evolution.privacy.read-messages=${EVOLUTION_READ_MESSAGES:false}
consumoesperto.evolution.privacy.read-status=${EVOLUTION_READ_STATUS:false}
consumoesperto.evolution.privacy.sync-full-history=${EVOLUTION_SYNC_FULL_HISTORY:false}
consumoesperto.evolution.privacy.restart-after-apply=${EVOLUTION_PRIVACY_RESTART_AFTER_APPLY:true}
consumoesperto.evolution.privacy.set-unavailable-presence=${EVOLUTION_PRIVACY_SET_UNAVAILABLE:true}

# Criar Utilizador + UsuarioAiConfig ao receber mensagem de número novo (multi-tenant WhatsApp).
consumoesperto.whatsapp.auto-provision-user=${WHATSAPP_AUTO_PROVISION_USER:false}

# Webhook Evolution/Twilio: só números autorizados e modo estrito multi-inquilino
consumoesperto.whatsapp.only-respond-owner=${ONLY_RESPOND_OWNER:false}
consumoesperto.whatsapp.authorized-numbers-extra=${WHATSAPP_AUTHORIZED_EXTRA:}
consumoesperto.whatsapp.owner-phone-global=${WHATSAPP_OWNER_PHONE:}

# Chave Groq da plataforma (fallback quando o utilizador não tem chave própria).
consumoesperto.ai.platform-groq-api-key=${GROQ_API_KEY:}
consumoesperto.ai.platform-openai-api-key=${OPENAI_API_KEY:}
consumoesperto.ai.platform-ollama-base-url=${OLLAMA_BASE_URL:}
consumoesperto.ai.platform-ollama-model=${OLLAMA_MODEL:llama3.2}
consumoesperto.ai.embedding-model=${OPENAI_EMBEDDING_MODEL:text-embedding-3-small}
consumoesperto.ai.platform-gemini-api-key=${GEMINI_API_KEY:}
consumoesperto.ai.gemini-base-url=${GEMINI_BASE_URL:https://generativelanguage.googleapis.com/v1beta}
consumoesperto.ai.gemini-model=${GEMINI_MODEL:gemini-2.5-flash}
consumoesperto.ai.platform-claude-api-key=${CLAUDE_API_KEY:}
consumoesperto.ai.claude-base-url=${CLAUDE_BASE_URL:https://api.anthropic.com}
consumoesperto.ai.claude-model=${CLAUDE_MODEL:claude-3-5-haiku-20241022}
consumoesperto.ai.platform-deepseek-api-key=${DEEPSEEK_API_KEY:}
consumoesperto.ai.deepseek-base-url=${DEEPSEEK_BASE_URL:https://api.deepseek.com/v1}
consumoesperto.ai.deepseek-model=${DEEPSEEK_MODEL:deepseek-chat}
# Modelo Groq mais leve para extração de PDF (menos tokens/dia que llama-3.3-70b).
consumoesperto.ai.groq-model-document=${GROQ_MODEL_DOCUMENT:llama-3.1-8b-instant}

# AI Token Suppressor — otimiza prompts antes do fallback Groq→OpenAI→Claude→Gemini→DeepSeek→Ollama
consumoesperto.ai.token-suppressor.enabled=${TOKEN_SUPPRESSOR_ENABLED:false}
consumoesperto.ai.token-suppressor.base-url=${TOKEN_SUPPRESSOR_URL:}
