п»ҝ# =============================================================================
# CONFIGURAГғвҖЎГғЖ’O CONSOLIDADA - CONSUMO ESPERTO
# =============================================================================
# Este arquivo contГғВ©m TODAS as configuraГғВ§ГғВөes do projeto em um sГғВі lugar
# =============================================================================

# =============================================================================
# CONFIGURAГғвҖЎГғвҖўES BГғВҒSICAS DO SPRING BOOT
# =============================================================================
server.port=8080
spring.application.name=consumo-esperto-backend
# spring.profiles.active=consolidated

# =============================================================================
# CONFIGURAГғвҖЎГғвҖўES POSTGRESQL
# =============================================================================
# IMPORTANTE: Use variГЎveis de ambiente para credenciais em produГ§ГЈo!
# Exemplo: export DATABASE_URL=jdbc:postgresql://localhost:5432/consumoesperto
#          export DATABASE_USERNAME=seu_usuario
#          export DATABASE_PASSWORD=sua_senha
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/consumoesperto}
spring.datasource.username=${DATABASE_USERNAME:bruce}
spring.datasource.password=${DATABASE_PASSWORD:0301HeX@}
spring.datasource.driver-class-name=org.postgresql.Driver

# Pool de conexГғВөes HikariCP otimizado para PostgreSQL
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.leak-detection-threshold=60000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.validation-interval=30000

# ConfiguraГғВ§ГғВөes crГғВӯticas para transaГғВ§ГғВөes Hibernate
spring.datasource.hikari.auto-commit=false
spring.datasource.hikari.transaction-isolation=TRANSACTION_READ_COMMITTED

# ConfiguraГғВ§ГғВЈo JPA/Hibernate para PostgreSQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.hibernate.ddl-auto-validate=false
spring.jpa.hibernate.ddl-auto-validate-schema=false
spring.jpa.hibernate.ddl-auto-validate-constraints=false
spring.jpa.hibernate.ddl-auto-validate-foreign-keys=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.hbm2ddl.auto=none
spring.jpa.properties.hibernate.hbm2ddl.auto-validate=false
spring.jpa.properties.hibernate.hbm2ddl.auto-validate-schema=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# OtimizaГғВ§ГғВөes de performance PostgreSQL
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true
spring.jpa.properties.hibernate.connection.provider_disables_autocommit=true

# =============================================================================
# CONFIGURAГғвҖЎГғвҖўES FLYWAY (MIGRAГғвҖЎГғвҖўES DE BANCO)
# =============================================================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.validate-on-migrate=false
spring.flyway.clean-disabled=false

# =============================================================================
# CONFIGURAГғвҖЎГғвҖўES DE CACHE (CAFFEINE)
# =============================================================================
spring.cache.type=caffeine
spring.cache.cache-names=usuarios,cartoes,faturas,transacoes
spring.cache.caffeine.spec=maximumSize=1000,expireAfterWrite=1h

# EstratГ©gia de fatura (fechamento estimado = vencimento вҲ’ N dias corridos; ajuste por banco se necessГЎrio)
consumoesperto.fatura.dias-entre-fechamento-e-vencimento=10

# Watcher (The Watcher): notificaГ§ГЈo WhatsApp no dia estimado de fechamento (uma vez por ciclo)
consumoesperto.watcher.fechamento.enabled=true
consumoesperto.watcher.fechamento.cron=0 0 9 * * *
consumoesperto.watcher.zone=America/Sao_Paulo

# =============================================================================
# CONFIGURAГғвҖЎГғвҖўES DE OBSERVABILIDADE (MICROMETER + PROMETHEUS) - PRODUГғвҖЎГғЖ’O
# =============================================================================
# Endpoints de monitoramento
management.endpoints.web.exposure.include=health,info,metrics,prometheus,env,configprops,beans,loggers
management.endpoint.health.show-details=${HEALTH_DETAILS:when-authorized}
management.endpoint.health.show-components=always
management.endpoint.info.enabled=true
management.endpoint.metrics.enabled=true
management.endpoint.prometheus.enabled=true

# ConfiguraГғВ§ГғВөes de mГғВ©tricas
management.metrics.export.prometheus.enabled=true
management.metrics.tags.application=${spring.application.name}
management.metrics.tags.environment=${SPRING_PROFILES_ACTIVE:prod}
management.metrics.tags.version=${APP_VERSION:1.0.0}
management.metrics.tags.instance=${HOSTNAME:localhost}

# ConfiguraГғВ§ГғВөes de saГғВәde customizadas
management.health.db.enabled=true
management.health.diskspace.enabled=true
management.health.defaults.enabled=true
management.health.circuitbreakers.enabled=true
management.health.redis.enabled=false

# ConfiguraГғВ§ГғВөes de mГғВ©tricas JVM
management.metrics.enable.jvm=true
management.metrics.enable.process=true
management.metrics.enable.system=true
management.metrics.enable.logback=true
management.metrics.enable.web=true
management.metrics.enable.cache=true

# ConfiguraГғВ§ГғВөes de tracing distribuГғВӯdo
management.tracing.sampling.probability=${TRACING_SAMPLING_PROBABILITY:0.1}
management.tracing.zipkin.endpoint=${ZIPKIN_ENDPOINT:}
management.tracing.jaeger.endpoint=${JAEGER_ENDPOINT:}

# =============================================================================
# CONFIGURAГғвҖЎГғвҖўES GERAIS
# =============================================================================
spring.main.allow-bean-definition-overriding=true
spring.main.allow-circular-references=true

# =============================================================================
# CONFIGURAГғвҖЎГғвҖўES DE SEGURANГғвҖЎA (JWT + OAUTH2) - PRODUГғвҖЎГғЖ’O
# =============================================================================
# ConfiguraГғВ§ГғВөes JWT - PRODUГғвҖЎГғЖ’O (OBRIGATГғ"RIO: USE VARIГғВҒVEIS DE AMBIENTE!)
# IMPORTANTE: Configure uma chave secreta forte via variГЎvel de ambiente em produГ§ГЈo!
# export JWT_SECRET=sua_chave_secreta_super_segura_de_pelo_menos_256_bits
jwt.secret=${JWT_SECRET:minha_chave_secreta_jwt_super_segura_para_consumo_esperto_2024_producao}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}
jwt.issuer=${JWT_ISSUER:consumo-esperto-api}
jwt.audience=${JWT_AUDIENCE:consumo-esperto-client}

# ConfiguraГғВ§ГғВөes OAuth2 Resource Server
spring.security.oauth2.resourceserver.jwt.issuer-uri=${JWT_ISSUER_URI:${ngrok.url}}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${JWT_JWK_SET_URI:${ngrok.url}/.well-known/jwks.json}

# Google OAuth2 - ProduГғВ§ГғВЈo
# IMPORTANTE: Configure via variГЎveis de ambiente em produГ§ГЈo!
# export GOOGLE_CLIENT_ID=seu_client_id
# export GOOGLE_CLIENT_SECRET=seu_client_secret
# OAuth2 Client - use "disabled" como padrГЈo para evitar erro de validaГ§ГЈo
# Configure GOOGLE_CLIENT_ID e GOOGLE_CLIENT_SECRET via variГЎveis de ambiente para habilitar
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:disabled}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:disabled}
# Escopos pГәblicos apenas (openid, profile, email) вҖ” tratamento/J.A.R.V.I.S. definido pelo utilizador na app.
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:14200/api/auth/google/callback
spring.security.oauth2.client.registration.google.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.google.client-name=Google

# ConfiguraГғВ§ГғВөes OAuth2 Provider
spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v2/userinfo
spring.security.oauth2.client.provider.google.jwk-set-uri=https://www.googleapis.com/oauth2/v3/certs

# =============================================================================
# CONFIGURAГғвҖЎГғвҖўES RESILIENCE4J (CIRCUIT BREAKER + RETRY)
# =============================================================================
resilience4j.circuitbreaker.instances.default.sliding-window-size=10
resilience4j.circuitbreaker.instances.default.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.default.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.default.permitted-number-of-calls-in-half-open-state=5

# =============================================================================
# CONFIGURAГғвҖЎГғвҖўES OPENAPI 3.0 (SPRINGDOC)
# =============================================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha

# =============================================================================
# CONFIGURAГғвҖЎГғвҖўES DE LOGGING ESTRUTURADO - PRODUГғвҖЎГғЖ’O
# =============================================================================
# PadrГғВөes de log estruturado para produГғВ§ГғВЈo
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{traceId:-},%X{spanId:-}] %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{traceId:-},%X{spanId:-}] %logger{36} - %msg%n

# ConfiguraГғВ§ГғВЈo de arquivo de log
logging.file.name=logs/consumo-esperto.log
logging.logback.rollingpolicy.max-file-size=100MB
logging.logback.rollingpolicy.max-history=30
logging.logback.rollingpolicy.total-size-cap=1GB

# Logs especГғВӯficos para PostgreSQL e Hibernate - PRODUГғвҖЎГғЖ’O
logging.level.org.hibernate.SQL=${HIBERNATE_SQL_LOG_LEVEL:WARN}
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=${HIBERNATE_BINDER_LOG_LEVEL:WARN}
logging.level.com.zaxxer.hikari=${HIKARI_LOG_LEVEL:WARN}
logging.level.org.springframework.jdbc=${SPRING_JDBC_LOG_LEVEL:WARN}

# Logs da aplicaГғВ§ГғВЈo - PRODUГғвҖЎГғЖ’O
logging.level.com.consumoesperto=${APP_LOG_LEVEL:INFO}
logging.level.org.springframework.security=${SECURITY_LOG_LEVEL:WARN}
logging.level.org.springframework.web=${WEB_LOG_LEVEL:WARN}
logging.level.org.springframework.boot=${BOOT_LOG_LEVEL:WARN}

# Logs de auditoria
logging.level.com.consumoesperto.security=${AUDIT_LOG_LEVEL:INFO}
logging.level.com.consumoesperto.controller=${CONTROLLER_LOG_LEVEL:INFO}

# =============================================================================
# CONFIGURAГғвҖЎГғвҖўES DE CORS
# =============================================================================
# PadrГөes permitidos pelo SecurityConfig (origins, vГӯrgula). ProduГ§ГЈo: use profile prod + CORS_ALLOWED_PATTERNS.
app.security.cors-allowed-patterns=${CORS_ALLOWED_PATTERNS:http://localhost:14200,http://localhost:4200,https://*.ngrok-free.app,https://*.ngrok.io}
app.frontend-base-url=${APP_FRONTEND_BASE_URL:http://localhost:14200}
# Callback OAuth Google Calendar (Cronos). Registre o mesmo URI no Google Cloud Console > Credenciais > URI de redirecionamento.
consumoesperto.google.calendar.redirect-uri=${GOOGLE_CALENDAR_REDIRECT_URI:http://localhost:18081/api/integracoes/google-calendar/oauth2/callback}
cors.allowed-origins=https://*.ngrok-free.app,https://79c3d0af5801.ngrok-free.app,http://localhost:14200,http://localhost:4200,http://localhost:3000
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=Authorization,Content-Type,X-Requested-With
cors.allow-credentials=true

# =============================================================================
# CONFIGURAГғвҖЎГғвҖўES NGROK (URL PГғЕЎBLICA)
# =============================================================================
# IMPORTANTE: Configure via variГЎvel de ambiente ou use detecГ§ГЈo automГЎtica
# export NGROK_URL=https://seu-dominio.ngrok-free.app
ngrok.url=${NGROK_URL:https://79c3d0af5801.ngrok-free.app}
ngrok.auto-detect=${NGROK_AUTO_DETECT:true}
ngrok.api-url=${NGROK_API_URL:http://localhost:14040/api/tunnels}

# Evolution API (WhatsApp provider)
# Em producao defina EVOLUTION_APIKEY / EVOLUTION_INSTANCE. Padrao local alinha ao script scripts/sincronizar-evolution-env.ps1; opcionalmente o script gera backend/config/application-dev-evolution-secrets.properties (import no fim deste ficheiro).
evolution.url=${EVOLUTION_URL:http://localhost:18080}
evolution.apikey=${EVOLUTION_APIKEY:}
evolution.instance=${EVOLUTION_INSTANCE:ConsumoEsperto}

# Criar Utilizador + UsuarioAiConfig ao receber mensagem de nГәmero novo (multi-tenant WhatsApp).
consumoesperto.whatsapp.auto-provision-user=${WHATSAPP_AUTO_PROVISION_USER:false}

# Webhook Evolution/Twilio: sГі nГәmeros autorizados e modo estrito multi-inquilino
consumoesperto.whatsapp.only-respond-owner=${ONLY_RESPOND_OWNER:false}
consumoesperto.whatsapp.authorized-numbers-extra=${WHATSAPP_AUTHORIZED_EXTRA:}
consumoesperto.whatsapp.owner-phone-global=${WHATSAPP_OWNER_PHONE:}

# Chave Groq da plataforma (fallback quando o utilizador nГЈo tem chave prГіpria).
consumoesperto.ai.platform-groq-api-key=${GROQ_API_KEY:}
consumoesperto.ai.platform-openai-api-key=${OPENAI_API_KEY:}
consumoesperto.ai.embedding-model=${OPENAI_EMBEDDING_MODEL:text-embedding-3-small}
consumoesperto.ai.platform-gemini-api-key=${GEMINI_API_KEY:}
consumoesperto.ai.gemini-base-url=${GEMINI_BASE_URL:https://generativelanguage.googleapis.com/v1beta}
consumoesperto.ai.gemini-model=${GEMINI_MODEL:gemini-2.5-flash}

# Persona J.A.R.V.I.S. (opcional): vocativo fixo e tom britГўnico nos prompts de IA
consumoesperto.jarvis.force-vocative=${JARVIS_FORCE_VOCATIVE:}
consumoesperto.jarvis.british-persona=${JARVIS_BRITISH_PERSONA:false}
# Resposta em voz (ElevenLabs) apГіs texto no WhatsApp/Evolution вҖ” requer elevenlabs.*
consumoesperto.jarvis.whatsapp-voice-reply=${JARVIS_WHATSAPP_VOICE_REPLY:false}
# Minutos entre alertas WhatsApp de risco (Sentinela/previsГЈo); 0 = sem limite
consumoesperto.jarvis.alerta-risco-cooldown-minutes=${JARVIS_ALERTA_RISCO_COOLDOWN_MINUTES:30}

# ElevenLabs вҖ” Protocolo ГҒudio (TTS) para PTT no WhatsApp
elevenlabs.api-key=${ELEVENLABS_API_KEY:}
elevenlabs.voice-id=${ELEVENLABS_VOICE_ID:}
elevenlabs.model-id=${ELEVENLABS_MODEL_ID:eleven_multilingual_v2}

# =============================================================================
# CONFIGURAГғвҖЎГғвҖўES DE TRANSAГғвҖЎГғвҖўES
# =============================================================================
spring.transaction.default-timeout=30s

# =============================================================================
# CONFIGURAГғвҖЎГғвҖўES DE MAPSTRUCT (MAPEAMENTO DTO-ENTITY)
# =============================================================================
mapstruct.default-component-model=spring
mapstruct.unmapped-target-policy=IGNORE

# =============================================================================
# CONFIGURAГғвҖЎГғвҖўES DE DESENVOLVIMENTO
# =============================================================================
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

# =============================================================================
# CONFIGURAГғвҖЎГғвҖўES DE TESTE
# =============================================================================
spring.jpa.hibernate.ddl-auto=none
spring.flyway.enabled=true

# =============================================================================
# CONFIGURAГғвҖЎГғвҖўES DE PRODUГғвҖЎГғЖ’O
# =============================================================================
# Estas configuraГғВ§ГғВөes sГғВЈo sobrescritas pelo profile 'prod'
spring.jpa.hibernate.ddl-auto=none
spring.flyway.enabled=true
# logging.level.root=WARN
# logging.level.com.consumoesperto=INFO

# =============================================================================
# CONFIGURAГғвҖЎГғвҖўES DE DESENVOLVIMENTO LOCAL
# =============================================================================
# Para uso com PostgreSQL local:
# spring.datasource.url=jdbc:postgresql://localhost:5432/consumo_esperto
# spring.datasource.username=consumo_esperto
# spring.datasource.password=consumo_esperto123

# =============================================================================
# CONFIGURAГғвҖЎГғвҖўES DE BACKUP E MONITORAMENTO
# =============================================================================
# Backup automГғВЎtico (opcional)
# backup.enabled=true
# backup.schedule=0 0 2 * * ?  # 2h da manhГғВЈ
# backup.retention-days=30

# =============================================================================
# CONFIGURAГғвҖЎГғвҖўES DE PERFORMANCE - PRODUГғвҖЎГғЖ’O
# =============================================================================
# Thread pool para operaГғВ§ГғВөes assГғВӯncronas
spring.task.execution.pool.core-size=${THREAD_POOL_CORE_SIZE:10}
spring.task.execution.pool.max-size=${THREAD_POOL_MAX_SIZE:50}
spring.task.execution.pool.queue-capacity=${THREAD_POOL_QUEUE_CAPACITY:200}
spring.task.execution.pool.keep-alive=${THREAD_POOL_KEEP_ALIVE:60s}
spring.task.execution.thread-name-prefix=async-exec-

# ConfiguraГғВ§ГғВөes de servidor Tomcat otimizadas
server.tomcat.threads.max=${TOMCAT_MAX_THREADS:200}
server.tomcat.threads.min-spare=${TOMCAT_MIN_THREADS:10}
server.tomcat.max-connections=${TOMCAT_MAX_CONNECTIONS:8192}
server.tomcat.accept-count=${TOMCAT_ACCEPT_COUNT:100}
server.tomcat.connection-timeout=${TOMCAT_CONNECTION_TIMEOUT:20000}
server.tomcat.keep-alive-timeout=${TOMCAT_KEEP_ALIVE_TIMEOUT:20000}
server.tomcat.max-keep-alive-requests=${TOMCAT_MAX_KEEP_ALIVE_REQUESTS:100}

# ConfiguraГғВ§ГғВөes de compressГғВЈo otimizadas
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json,application/xml
server.compression.min-response-size=${COMPRESSION_MIN_SIZE:1024}
server.compression.excluded-user-agents=.*bot.*,.*spider.*,.*crawler.*

# ConfiguraГғВ§ГғВөes de cache otimizadas
spring.cache.caffeine.spec=${CACHE_SPEC:maximumSize=2000,expireAfterWrite=2h,recordStats}
spring.cache.cache-names=usuarios,cartoes,faturas,transacoes,relatorios,simulacoes

# ConfiguraГғВ§ГғВөes de Hibernate otimizadas
spring.jpa.properties.hibernate.jdbc.batch_size=${HIBERNATE_BATCH_SIZE:25}
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true
spring.jpa.properties.hibernate.connection.provider_disables_autocommit=true
spring.jpa.properties.hibernate.cache.use_second_level_cache=false
spring.jpa.properties.hibernate.cache.use_query_cache=false
# spring.jpa.properties.hibernate.cache.region.factory_class=org.hibernate.cache.jcache.JCacheRegionFactory

# ConfiguraГғВ§ГғВөes de pool de conexГғВөes otimizadas
spring.datasource.hikari.maximum-pool-size=${HIKARI_MAX_POOL_SIZE:20}
spring.datasource.hikari.minimum-idle=${HIKARI_MIN_IDLE:5}
spring.datasource.hikari.connection-timeout=${HIKARI_CONNECTION_TIMEOUT:30000}
spring.datasource.hikari.idle-timeout=${HIKARI_IDLE_TIMEOUT:600000}
spring.datasource.hikari.max-lifetime=${HIKARI_MAX_LIFETIME:1800000}
spring.datasource.hikari.validation-timeout=${HIKARI_VALIDATION_TIMEOUT:5000}
spring.datasource.hikari.leak-detection-threshold=${HIKARI_LEAK_DETECTION:60000}

# =============================================================================
# CONFIGURAГғвҖЎГғвҖўES DE SEGURANГғвҖЎA ADICIONAIS
# =============================================================================
# Rate limiting ATIVADO
rate.limit.enabled=true
rate.limit.requests-per-minute=100
rate.limit.burst-capacity=200

# ConfiguraГғВ§ГғВЈo para evitar loops de autenticaГғВ§ГғВЈo em endpoints de erro
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=never
server.error.include-exception=false

# Headers de seguranГғВ§a HTTP
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=${COOKIE_SECURE:false}
server.servlet.session.cookie.same-site=strict
server.servlet.session.cookie.max-age=3600

# Headers de seguranГғВ§a adicionais
security.headers.content-security-policy=default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' https:; connect-src 'self' https:; frame-ancestors 'none'
security.headers.strict-transport-security=max-age=31536000; includeSubDomains
security.headers.x-frame-options=DENY
security.headers.x-content-type-options=nosniff
security.headers.x-xss-protection=1; mode=block
security.headers.referrer-policy=strict-origin-when-cross-origin
security.headers.permissions-policy=geolocation=(), microphone=(), camera=()

# ConfiguraГғВ§ГғВөes de auditoria de seguranГғВ§a
security.audit.enabled=true
security.audit.log-failed-logins=true
security.audit.log-successful-logins=true
security.audit.log-sensitive-operations=true

# ConfiguraГғВ§ГғВөes de bloqueio de conta
security.account.lockout.max-attempts=5
security.account.lockout.duration=15m
security.account.lockout.threshold=3

# ConfiguraГғВ§ГғВөes de sessГғВЈo
security.session.max-sessions=1
security.session.invalidate-on-expiration=true
security.session.fixation-protection=changeSessionId

# ConfiguraГғВ§ГғВөes de senha
security.password.min-length=8
security.password.require-uppercase=true
security.password.require-lowercase=true
security.password.require-numbers=true
security.password.require-special-chars=true
security.password.history-size=5

# ConfiguraГғВ§ГғВөes de token
security.token.refresh-token.enabled=true
