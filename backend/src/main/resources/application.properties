# =============================================================================
# CONFIGURAÇÕES PRINCIPAIS DA APLICAÇÃO CONSUMO ESPERTO
# =============================================================================
# Este arquivo contém as configurações base da aplicação.
# Configurações específicas de ambiente são definidas nos arquivos
# application-{profile}.properties correspondentes.
# =============================================================================

# =============================================================================
# CONFIGURAÇÕES DO SERVIDOR
# =============================================================================
# Porta onde a aplicação Spring Boot será executada
server.port=8080

# =============================================================================
# PERFIL ATIVO
# =============================================================================
# Perfil ativo determina qual arquivo de configuração será usado:
# - h2: banco de dados H2 em memória (desenvolvimento/teste)
# - dev: banco de dados Oracle para desenvolvimento
# - prod: banco de dados Oracle para produção
# - docker: configurações para ambiente Docker
spring.profiles.active=h2

# =============================================================================
# CONFIGURAÇÕES COMUNS DO BANCO DE DADOS
# =============================================================================
# Driver JDBC padrão (será sobrescrito pelos perfis específicos)
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# =============================================================================
# CONFIGURAÇÕES DE CODIFICAÇÃO HIBERNATE
# =============================================================================
# Configurações para garantir suporte completo a caracteres UTF-8
# Essencial para nomes brasileiros, acentos e caracteres especiais
spring.jpa.properties.hibernate.connection.charSet=UTF-8
spring.jpa.properties.hibernate.connection.characterEncoding=UTF-8
spring.jpa.properties.hibernate.connection.useUnicode=true

# =============================================================================
# CONFIGURAÇÕES DE SEGURANÇA JWT
# =============================================================================
# Chave secreta para assinar e verificar tokens JWT
# IMPORTANTE: Em produção, use uma chave forte e única
jwt.secret=consumoEspertoSecretKey2024

# Tempo de expiração do token JWT em milissegundos
# 86400000 = 24 horas (24 * 60 * 60 * 1000)
jwt.expiration=86400000

# =============================================================================
# CONFIGURAÇÕES DO SWAGGER
# =============================================================================
# Estratégia de matching de paths para compatibilidade com Swagger
spring.mvc.pathmatch.matching-strategy=ant_path_matcher

# =============================================================================
# CONFIGURAÇÕES DE CORS (CROSS-ORIGIN RESOURCE SHARING)
# =============================================================================
# Permite que o frontend Angular (localhost:4200) acesse a API
# Em produção, configure apenas os domínios permitidos
spring.web.cors.allowed-origins=http://localhost:4200
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*

# =============================================================================
# CONFIGURAÇÕES DE LOG
# =============================================================================
# Nível de log para a aplicação ConsumoEsperto
# DEBUG: mostra informações detalhadas para desenvolvimento
logging.level.com.consumoesperto=DEBUG

# Nível de log para Spring Security
# DEBUG: mostra detalhes de autenticação e autorização
logging.level.org.springframework.security=DEBUG

# =============================================================================
# CONFIGURAÇÕES DAS APIS BANCÁRIAS - NUBANK
# =============================================================================
# Credenciais para integração com a API do Nubank
# Obtenha estas credenciais no portal de desenvolvedores do Nubank
bank.api.nubank.client-id=your_nubank_client_id
bank.api.nubank.client-secret=your_nubank_client_secret
bank.api.nubank.auth-url=https://api.nubank.com.br/oauth/authorize
bank.api.nubank.token-url=https://api.nubank.com.br/oauth/token
bank.api.nubank.api-url=https://api.nubank.com.br/api

# =============================================================================
# CONFIGURAÇÕES DAS APIS BANCÁRIAS - MERCADO PAGO
# =============================================================================
# Credenciais para integração com a API do Mercado Pago
# Obtenha estas credenciais no portal de desenvolvedores do Mercado Pago
bank.api.mercadopago.client-id=your_mercadopago_client_id
bank.api.mercadopago.client-secret=your_mercadopago_client_secret
bank.api.mercadopago.auth-url=https://api.mercadopago.com/authorization
bank.api.mercadopago.token-url=https://api.mercadopago.com/oauth/token
bank.api.mercadopago.api-url=https://api.mercadopago.com/v1

# =============================================================================
# CONFIGURAÇÕES DAS APIS BANCÁRIAS - ITAÚ
# =============================================================================
# Credenciais para integração com a API do Itaú
# Obtenha estas credenciais no portal de desenvolvedores do Itaú
bank.api.itau.client-id=your_itau_client_id
bank.api.itau.client-secret=your_itau_client_secret
bank.api.itau.auth-url=https://api.itau.com.br/oauth/authorize
bank.api.itau.token-url=https://api.itau.com.br/oauth/token
bank.api.itau.api-url=https://api.itau.com.br/api

# =============================================================================
# CONFIGURAÇÕES DAS APIS BANCÁRIAS - INTER
# =============================================================================
# Credenciais para integração com a API do Inter
# Obtenha estas credenciais no portal de desenvolvedores do Inter
bank.api.inter.client-id=your_inter_client_id
bank.api.inter.client-secret=your_inter_client_secret
bank.api.inter.auth-url=https://api.inter.com.br/oauth/authorize
bank.api.inter.token-url=https://api.inter.com.br/oauth/token
bank.api.inter.api-url=https://api.inter.com.br/api

# =============================================================================
# CONFIGURAÇÕES DO GOOGLE OAUTH2
# =============================================================================
# Credenciais para autenticação via Google
# Obtenha estas credenciais no Google Cloud Console
# Configure o redirect-uri para: http://localhost:8080/api/auth/google/callback
spring.security.oauth2.client.registration.google.client-id=your_google_client_id
spring.security.oauth2.client.registration.google.client-secret=your_google_client_secret
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/api/auth/google/callback
