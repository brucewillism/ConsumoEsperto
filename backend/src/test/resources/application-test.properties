# =============================================================================
# CONFIGURAÇÕES DE TESTE - CONSUMO ESPERTO
# =============================================================================
# Este arquivo contém configurações específicas para testes unitários
# e de integração, permitindo que os testes rodem sem dependências externas
# =============================================================================

# =============================================================================
# CONFIGURAÇÕES BÁSICAS
# =============================================================================
spring.application.name=consumo-esperto-backend-test

# =============================================================================
# CONFIGURAÇÕES DE BANCO DE DADOS (H2 em memória para testes)
# =============================================================================
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=test

# =============================================================================
# CONFIGURAÇÕES JPA/HIBERNATE PARA TESTES
# =============================================================================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.hbm2ddl.auto=create

# =============================================================================
# DESABILITAR FLYWAY EM TESTES (usar H2 em memória)
# =============================================================================
spring.flyway.enabled=false

# =============================================================================
# CONFIGURAÇÕES OAUTH2 (desabilitar validação em testes)
# =============================================================================
# Configurar valores vazios para evitar erro de validação
spring.security.oauth2.client.registration.google.client-id=test-client-id
spring.security.oauth2.client.registration.google.client-secret=test-client-secret

# =============================================================================
# CONFIGURAÇÕES JWT PARA TESTES
# =============================================================================
jwt.secret=test_jwt_secret_key_for_testing_only_not_for_production_use
jwt.expiration=86400000

# =============================================================================
# CONFIGURAÇÕES DE LOG PARA TESTES
# =============================================================================
logging.level.root=WARN
logging.level.com.consumoesperto=INFO
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN

# =============================================================================
# DESABILITAR FUNCIONALIDADES DESNECESSÁRIAS EM TESTES
# =============================================================================
management.endpoints.web.exposure.include=
spring.devtools.restart.enabled=false

